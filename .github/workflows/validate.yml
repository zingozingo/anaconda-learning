name: Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install pyyaml

      - name: Basic syntax check for scripts (non-fatal)
        run: |
          python -m py_compile 03-finance-101/scripts/*.py || echo "Note: some scripts may require full env"
          python -m py_compile 04-finance-201/scripts/*.py || echo "Note: some scripts may require full env"
        continue-on-error: true

      - name: Check notebooks are valid JSON (non-fatal)
        run: |
          cat > /tmp/check_notebooks.py << 'PYEOF'
            import json, glob, sys
            oks = []
            for nb in glob.glob("**/*.ipynb", recursive=True):
                if "checkpoint" in nb: continue
                try:
                    with open(nb) as f:
                        data = json.load(f)
                    print("OK:", nb, len(data.get("cells", [])), "cells")
                    oks.append(nb)
                except Exception as e:
                    print("Issue with", nb, ":", e)
            print("Notebooks checked:", len(oks))
          PYEOF
          python3 -c 'import textwrap; exec(textwrap.dedent(open("/tmp/check_notebooks.py").read()))' || echo "Notebook check had issues"
        continue-on-error: true

      - name: Check environment ymls (non-fatal)
        run: |
          cat > /tmp/check_envs.py << 'PYEOF'
            import yaml, glob, sys
            oks = []
            for fpath in glob.glob("**/environment.yml", recursive=True):
                if "full-export" in fpath: continue
                try:
                    with open(fpath) as fh:
                        data = yaml.safe_load(fh)
                    print("OK:", fpath, "name=", (data or {}).get("name", "MISSING"), "deps=", len((data or {}).get("dependencies", [])))
                    oks.append(fpath)
                except Exception as e:
                    print("Issue with", fpath, ":", e)
            print("Envs checked:", len(oks))
          PYEOF
          python3 -c 'import textwrap; exec(textwrap.dedent(open("/tmp/check_envs.py").read()))' || echo "Env check had issues"
        continue-on-error: true

      - name: Summary
        if: always()
        run: echo "Validation checks completed (non-fatal for this learning project). See step logs for any issues."
