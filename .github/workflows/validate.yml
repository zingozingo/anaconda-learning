name: Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install pyyaml

      - name: Basic syntax check for scripts (non-fatal)
        run: |
          python -m py_compile 03-finance-101/scripts/*.py || echo "Note: some scripts may require full env"
          python -m py_compile 04-finance-201/scripts/*.py || echo "Note: some scripts may require full env"
        continue-on-error: true

      - name: Check notebooks are valid JSON (non-fatal)
        run: |
          python -c '
import json, glob
for nb in glob.glob("**/*.ipynb", recursive=True):
    if "checkpoint" in nb: continue
    try:
        with open(nb) as f:
            data = json.load(f)
        print("OK:", nb, len(data.get("cells", [])), "cells")
    except Exception as e:
        print("Issue with", nb, ":", e)
' || echo "Notebook check had issues"
        continue-on-error: true

      - name: Check environment ymls (non-fatal)
        run: |
          python -c '
import yaml, glob
for f in glob.glob("**/environment.yml", recursive=True):
    if "full-export" in f: continue
    try:
        with open(f) as fh:
            data = yaml.safe_load(fh)
        print("OK:", f, "name=", data.get("name", "MISSING"), "deps=", len(data.get("dependencies", [])))
    except Exception as e:
        print("Issue with", f, ":", e)
' || echo "Env check had issues"
        continue-on-error: true

      - name: Summary
        if: always()
        run: echo "Validation checks completed (non-fatal for this learning project). See step logs for any issues."
