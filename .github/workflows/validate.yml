name: Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Basic syntax check for scripts
        run: |
          python -m py_compile 03-finance-101/scripts/*.py || echo "Note: some scripts may require full env"
          python -m py_compile 04-finance-201/scripts/*.py || echo "Note: some scripts may require full env"

      - name: Check notebooks are valid JSON
        run: |
          for nb in $(find . -name "*.ipynb" ! -path "*/.ipynb_checkpoints/*"); do
            python -c "import json; json.load(open('$nb')); print('OK: $nb')" || echo "Issue with $nb"
          done

      - name: Check env files have name
        run: |
          for f in $(find . -name 'environment.yml' ! -name '*full-export*'); do
            python -c "
import yaml
data = yaml.safe_load(open('$f'))
print(f'$f name: {data.get(\"name\", \"missing\")}')
" 
          done
