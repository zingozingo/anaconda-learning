name: Validate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install pyyaml

      - name: Basic syntax check for scripts (non-fatal for learning)
        run: |
          python -m py_compile 03-finance-101/scripts/*.py || echo "Note: some scripts may require the full conda env"
          python -m py_compile 04-finance-201/scripts/*.py || echo "Note: some scripts may require the full conda env"
        continue-on-error: true

      - name: Check notebooks are valid JSON (non-fatal)
        run: |
          for nb in $(find . -name "*.ipynb" ! -path "*/.ipynb_checkpoints/*"); do
            python -c "
import json, sys
try:
    with open('$nb') as f:
        data = json.load(f)
    print(f'OK: $nb ({len(data.get(\"cells\", []))} cells)')
except Exception as e:
    print(f'Issue with $nb: {e}')
" 
          done
        continue-on-error: true

      - name: Check environment ymls have basic structure (non-fatal)
        run: |
          for f in $(find . -name 'environment.yml' ! -name '*full-export*'); do
            python -c "
import yaml, sys
try:
    with open('$f') as fh:
        data = yaml.safe_load(fh)
    name = data.get('name', 'MISSING')
    deps = len(data.get('dependencies', []))
    print(f'OK: $f name={name} deps={deps}')
except Exception as e:
    print(f'Issue with $f: {e}')
" 
          done
        continue-on-error: true

      - name: Summary
        run: echo "Validation checks completed (some may be non-fatal for this learning project). See individual step logs."
